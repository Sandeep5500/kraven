<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Apply Kit — Kraven</title>
<style>
  :root { --bg:#0f1115; --panel:#171a21; --line:#262b36; --txt:#e6e8ec; --mut:#9aa3b2; --acc:#6ea8fe; --good:#3fb950; }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--txt);font:14px/1.5 -apple-system,Segoe UI,Roboto,sans-serif;}
  header{padding:16px 28px;border-bottom:1px solid var(--line);}
  h1{font-size:18px;margin:0 0 3px;}
  .sub{color:var(--mut);font-size:13px;}
  .sub a{color:var(--acc);text-decoration:none;}
  .wrap{max-width:860px;margin:0 auto;padding:22px 20px 60px;}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:10px;margin:16px 0;overflow:hidden;}
  .card h2{font-size:14px;margin:0;padding:11px 14px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;}
  .card .body{padding:14px;white-space:pre-wrap;font-size:13.5px;}
  .essay{padding:14px;border-bottom:1px solid var(--line);}
  .essay:last-child{border-bottom:none;}
  .essay .q{color:var(--acc);font-weight:600;margin-bottom:5px;font-size:13px;}
  .essay .a{white-space:pre-wrap;color:var(--txt);}
  button{background:#1d2230;color:var(--txt);border:1px solid var(--line);border-radius:6px;padding:5px 11px;font-size:12px;cursor:pointer;}
  button:hover{border-color:var(--acc);}
  .bar{display:flex;gap:10px;align-items:center;margin-top:8px;}
  .copy{font-size:11px;padding:3px 9px;}
  #status{color:var(--mut);padding:30px 0;text-align:center;}
  .err{color:#ff7b72;}
</style>
</head>
<body>
<header>
  <h1>✍️ Apply Kit</h1>
  <div class="sub" id="roleline"></div>
</header>
<div class="wrap">
  <div class="bar">
    <button id="regen">↻ Regenerate</button>
    <span class="sub" id="meta"></span>
  </div>
  <div id="status">Generating from your resume… (first time can take ~20s)</div>
  <div id="out"></div>
</div>
<script>
const key = new URLSearchParams(location.search).get("key");
const $ = s=>document.querySelector(s);
function card(title, text){
  const id="c"+Math.random().toString(36).slice(2);
  return `<div class="card"><h2>${title}
    <button class="copy" data-c="${id}">Copy</button></h2>
    <div class="body" id="${id}">${esc(text||"")}</div></div>`;
}
function esc(s){return (s||"").replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}

async function gen(force){
  $("#status").style.display="block";
  $("#status").className=""; $("#status").textContent="Generating from your resume… (first time can take ~20s)";
  $("#out").innerHTML="";
  try{
    const r=await fetch(`/api/role/${encodeURIComponent(key)}/applykit?force=${force?1:0}`,{method:"POST"});
    if(!r.ok){ const e=await r.json(); throw new Error(e.detail||"failed"); }
    const d=await r.json();
    if(d.role) $("#roleline").innerHTML=`${esc(d.role.role_title)} — <b>${esc(d.role.company)}</b> · <a href="${esc(d.role.url)}" target="_blank">Apply ↗</a>`;
    $("#meta").textContent = d.cached ? "(cached — hit Regenerate for a fresh draft)" : "freshly generated";
    const k=d.kit;
    let html = card("LinkedIn outreach", k.linkedin_outreach)
             + card("Recruiter email", k.recruiter_email)
             + card("Referral message", k.referral_message);
    if((k.essays||[]).length){
      html += `<div class="card"><h2>Application essay drafts</h2>` +
        k.essays.map(e=>`<div class="essay"><div class="q">${esc(e.q)}</div><div class="a">${esc(e.a)}</div></div>`).join("") +
        `</div>`;
    }
    $("#status").style.display="none";
    $("#out").innerHTML=html;
    document.querySelectorAll(".copy").forEach(b=>b.onclick=()=>{
      navigator.clipboard.writeText($("#"+b.dataset.c).innerText); b.textContent="Copied!"; setTimeout(()=>b.textContent="Copy",1200);
    });
  }catch(e){
    $("#status").className="err";
    $("#status").innerHTML = esc(e.message) + (/resume/i.test(e.message)?` — <a href="/" style="color:#6ea8fe">go upload it on the home page</a>`:"");
  }
}
$("#regen").onclick=()=>gen(true);
if(!key){ $("#status").textContent="No role specified."; } else { gen(false); }
</script>
</body>
</html>
