<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Kraven — AI Jobs</title>
<style>
  :root { --bg:#0f1115; --panel:#171a21; --line:#262b36; --txt:#e6e8ec; --mut:#9aa3b2; --acc:#6ea8fe; --good:#3fb950; --warn:#d29922; --orange:#e0793b; --orange-dim:#7a4a2c; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--txt); font:14px/1.45 -apple-system,Segoe UI,Roboto,sans-serif; }
  header { padding:13px 20px; display:flex; gap:14px; align-items:center; flex-wrap:wrap;
           border-bottom:1px solid var(--line);
           background:linear-gradient(90deg, rgba(224,121,59,0.10), rgba(224,121,59,0) 38%), #12141a;
           box-shadow:0 1px 0 var(--orange-dim); }
  .brand { display:flex; align-items:center; gap:10px; }
  .brand svg { display:block; }
  h1 { font-size:18px; margin:0; font-weight:700; letter-spacing:0.3px; }
  h1 .x { color:var(--orange); }
  .stats { color:var(--mut); font-size:12px; }
  .controls { display:flex; gap:8px; flex-wrap:wrap; padding:12px 20px; border-bottom:1px solid var(--line); align-items:center; }
  select, input, button { background:var(--panel); color:var(--txt); border:1px solid var(--line); border-radius:6px; padding:6px 9px; font-size:13px; }
  input[type=text] { min-width:220px; }
  label.chk { color:var(--mut); display:flex; gap:5px; align-items:center; }
  .controls { position:relative; }
  .fwrap { position:relative; }
  #filters-btn { display:flex; gap:7px; align-items:center; }
  .badge { background:var(--orange); color:#10110f; border-radius:9px; padding:0 6px; font-size:11px; font-weight:700; min-width:16px; text-align:center; }
  .badge:empty { display:none; }
  .panel { position:absolute; top:38px; left:0; z-index:40; width:340px; background:var(--panel);
           border:1px solid var(--line); border-top:2px solid var(--orange); border-radius:10px;
           padding:14px; display:none; box-shadow:0 10px 30px rgba(0,0,0,.5); }
  .panel.open { display:block; }
  .prow { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:9px; }
  .prow label { color:var(--mut); font-size:12px; }
  .prow select { min-width:185px; }
  .ptoggles { display:grid; grid-template-columns:1fr 1fr; gap:7px 12px; margin:12px 0; padding-top:10px; border-top:1px solid var(--line); }
  .pexcl { padding-top:10px; border-top:1px solid var(--line); }
  .pexcl > label { color:var(--mut); font-size:12px; display:block; margin-bottom:5px; }
  .pexcl select { width:100%; }
  .pfoot { margin-top:12px; }
  .chips { display:flex; flex-wrap:wrap; gap:5px; }
  #excl-chips { margin-top:7px; }
  .chip { background:#1d2230; border:1px solid var(--line); border-radius:12px; padding:2px 6px 2px 9px;
          font-size:11px; color:var(--txt); display:inline-flex; gap:5px; align-items:center; }
  .chip b { color:var(--mut); cursor:pointer; font-weight:700; }
  .chip b:hover { color:#ff7b72; }
  #active-chips .chip { background:#15212e; }
  .tabs { display:flex; gap:4px; padding:8px 20px 0; border-bottom:1px solid var(--line); }
  .tab { background:none; border:none; border-bottom:2px solid transparent; border-radius:0;
         color:var(--mut); padding:8px 14px; font-size:13px; cursor:pointer; }
  .tab:hover { color:var(--txt); }
  .tab.active { color:var(--txt); border-bottom-color:var(--orange); font-weight:600; }
  .tcount { background:#1d2230; border-radius:9px; padding:0 6px; font-size:11px; margin-left:3px; }
  .stale { color:#ff7b72; font-size:11px; margin-left:5px; font-weight:700; }
  .stale:empty { display:none; }
  .statsel { font-size:11px; padding:2px 4px; }
  .age { font-size:11px; font-weight:700; margin-top:3px; }
  .wrap { padding:0 12px; }
  table { width:100%; border-collapse:collapse; table-layout:fixed; }
  th, td { text-align:left; padding:9px 10px; border-bottom:1px solid var(--line); vertical-align:top; overflow:hidden; word-wrap:break-word; }
  th { position:sticky; top:0; background:var(--bg); color:var(--mut); font-weight:600; cursor:pointer; white-space:nowrap; font-size:12px; }
  th.sorted { color:var(--orange); } th.sorted::after { content:" ↓"; } th.asc.sorted::after { content:" ↑"; }
  tr:hover td { background:#12151c; }
  .title { font-weight:600; line-height:1.3; }
  .title a { color:var(--txt); text-decoration:none; }
  .title a:hover { color:var(--acc); }
  .ov { color:var(--mut); font-size:12px; margin-top:4px;
        display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .co { color:var(--acc); }
  .tag { display:inline-block; background:#1d2230; color:var(--mut); border:1px solid var(--line); border-radius:10px; padding:1px 8px; margin:1px 3px 1px 0; font-size:11px; }
  .comp { color:var(--good); font-weight:600; white-space:nowrap; }
  .yoe { font-weight:700; } .yoe-ok { color:var(--good); } .yoe-high { color:#ff7b72; }
  .fit { font-weight:700; }
  td.actions { display:flex; flex-direction:column; gap:6px; }
  td.actions a { display:inline-block; }
  .kit { color:var(--orange); text-decoration:none; cursor:pointer; }
  .kit:hover { color:#ffa46a; }
  .appl { color:var(--mut); font-size:11px; display:flex; gap:4px; align-items:center; cursor:pointer; }
  button:hover { border-color:var(--orange); }
  /* apply-kit modal */
  .overlay { position:fixed; inset:0; background:rgba(0,0,0,0.6); display:none; z-index:50;
             padding:40px 16px; overflow-y:auto; }
  .overlay.open { display:block; }
  .modal { max-width:840px; margin:0 auto; background:var(--panel); border:1px solid var(--line);
           border-top:2px solid var(--orange); border-radius:10px; }
  .modal .head { display:flex; justify-content:space-between; align-items:center; gap:12px;
                 padding:14px 16px; border-bottom:1px solid var(--line); position:sticky; top:0; background:var(--panel); }
  .modal .head .t { font-weight:700; }
  .modal .head .t small { color:var(--mut); font-weight:400; }
  .modal .body { padding:8px 16px 20px; }
  .kcard { background:#12151c; border:1px solid var(--line); border-radius:8px; margin:12px 0; }
  .kcard h3 { font-size:13px; margin:0; padding:9px 12px; border-bottom:1px solid var(--line);
              display:flex; justify-content:space-between; align-items:center; color:var(--orange); }
  .kcard .c { padding:12px; white-space:pre-wrap; font-size:13px; }
  .essay2 { padding:10px 12px; border-bottom:1px solid var(--line); }
  .essay2:last-child { border-bottom:none; }
  .essay2 .q { color:var(--acc); font-weight:600; font-size:12.5px; margin-bottom:4px; }
  .essay2 .a { white-space:pre-wrap; }
  .copy { font-size:11px; padding:3px 9px; cursor:pointer; }
  #kstatus { padding:30px; text-align:center; color:var(--mut); }
  #kstatus.err { color:#ff7b72; }
  .imp { font-weight:700; }
  .imp5 { color:#ff7b72; } .imp4 { color:var(--warn); } .imp3 { color:var(--txt); } .imp2,.imp1 { color:var(--mut); }
  .apply { color:var(--acc); text-decoration:none; }
  .muted { color:var(--mut); }
  .pill { font-size:11px; border:1px solid var(--line); border-radius:6px; padding:1px 6px; color:var(--mut); }
  #empty { padding:40px; text-align:center; color:var(--mut); }
</style>
</head>
<body>
<header>
  <div class="brand">
    <svg width="26" height="26" viewBox="0 0 24 24" aria-label="Kraven">
      <g fill="none" stroke="var(--orange)" stroke-width="2.3" stroke-linecap="round">
        <path d="M6.5 3.5 C7.2 9, 7.6 15, 8.2 20.5"/>
        <path d="M11.8 2.6 C12.4 8.5, 12.7 14.8, 13 21.2"/>
        <path d="M17 3.6 C17.4 9, 17.4 15, 17 20.4"/>
      </g>
    </svg>
    <h1>KRAVEN<span class="x">.</span></h1>
  </div>
  <span class="stats" id="stats"></span>
  <span class="stats" id="updated" title="When the role data was last refreshed"></span>
  <span style="margin-left:auto; display:flex; gap:10px; align-items:center;">
    <span class="stats" id="whoami"></span>
    <input type="file" id="resume-file" accept=".pdf,.txt" style="display:none"/>
    <button id="resume-btn">📄 Upload resume</button>
    <span class="stats" id="resume-status"></span>
  </span>
</header>
<div class="controls">
  <input type="text" id="search" placeholder="Search title / company / overview…"/>
  <div class="fwrap">
    <button id="filters-btn">⚙ Filters <span id="fcount" class="badge"></span></button>
    <div id="panel" class="panel">
      <div class="prow"><label>Company</label>
        <select id="company"><option value="">All companies</option></select></div>
      <div class="prow"><label>Category</label>
        <select id="category"><option value="">All categories</option></select></div>
      <div class="prow"><label>Max YOE</label>
        <select id="max_yoe" title="Maximum years of experience required">
          <option value="">Any YOE</option><option value="0">New grad (0 yrs)</option>
          <option value="1">≤ 1 yr</option><option value="2">≤ 2 yrs</option>
          <option value="3" selected>≤ 3 yrs</option><option value="4">≤ 4 yrs</option>
        </select></div>
      <div class="prow"><label>Posted within</label>
        <select id="posted_within" title="Posted (or first seen) within N days">
          <option value="">Any time</option>
          <option value="3">3 days</option><option value="7">7 days</option>
          <option value="14">14 days</option><option value="30">30 days</option>
        </select></div>
      <div class="prow"><label>Min fit</label>
        <select id="min_relevance" title="Minimum resume-fit score (0-100)">
          <option value="">Any fit</option><option value="40">≥ 40</option>
          <option value="50">≥ 50</option><option value="60">≥ 60</option>
          <option value="70">≥ 70</option><option value="80">≥ 80</option>
        </select></div>
      <div class="prow"><label>Min impact</label>
        <select id="min_impact"><option value="">Any impact</option>
          <option value="5">5</option><option value="4">≥ 4</option><option value="3">≥ 3</option>
        </select></div>
      <div class="prow"><label>Seniority</label>
        <select id="seniority"><option value="">Any seniority</option>
          <option>new-grad</option><option>mid</option><option>senior</option>
          <option>staff</option><option>principal</option><option>intern</option>
        </select></div>
      <div class="ptoggles">
        <label class="chk" title="Hide roles that hard-require a PhD"><input type="checkbox" id="hide_phd" checked/> Hide PhD-required</label>
        <label class="chk"><input type="checkbox" id="yoe_known"/> Stated YOE only</label>
        <label class="chk"><input type="checkbox" id="has_comp"/> Has comp</label>
        <label class="chk"><input type="checkbox" id="closed"/> Show closed</label>
      </div>
      <div class="pexcl">
        <label>Exclude companies</label>
        <select id="excl-pick"><option value="">+ add company to hide…</option></select>
        <div id="excl-chips" class="chips"></div>
      </div>
      <div class="pfoot"><button id="reset">Reset to defaults</button></div>
    </div>
  </div>
  <span id="active-chips" class="chips"></span>
</div>
<div class="tabs">
  <button class="tab active" data-tab="new">New <span class="tcount" id="cnt-new"></span></button>
  <button class="tab" data-tab="waiting">⏳ Waiting <span class="tcount" id="cnt-waiting"></span><span class="stale" id="stale-badge"></span></button>
  <button class="tab" data-tab="applied">✓ Applied <span class="tcount" id="cnt-applied"></span></button>
</div>
<div class="wrap">
  <table>
    <colgroup>
      <col style="width:26%"><col style="width:8%"><col style="width:11%">
      <col style="width:8%"><col style="width:5%"><col style="width:6%">
      <col style="width:5%"><col style="width:7%"><col style="width:11%">
      <col style="width:4%"><col style="width:9%">
    </colgroup>
    <thead><tr>
      <th data-sort="role_title">Role</th>
      <th data-sort="company">Company</th>
      <th>Location</th>
      <th data-sort="comp_max">Comp</th>
      <th data-sort="yoe_min" title="Min years of experience required">YOE</th>
      <th data-sort="relevance" class="sorted" title="Fit vs your resume (0-100)">Fit</th>
      <th data-sort="impact">Impact</th>
      <th data-sort="posted" title="Posted (or first-seen) date">Posted</th>
      <th>Tags</th>
      <th data-sort="first_seen" id="th-seen">Seen</th>
      <th></th>
    </tr></thead>
    <tbody id="rows"></tbody>
  </table>
  <div id="empty" style="display:none">No roles match these filters.</div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="head">
      <div class="t" id="ktitle">✍️ Apply Kit</div>
      <div style="display:flex; gap:8px;">
        <button id="kregen">↻ Regenerate</button>
        <button id="kclose">← Back to listings</button>
      </div>
    </div>
    <div class="body">
      <div id="kstatus">Generating from your resume… (first time can take ~20s)</div>
      <div id="kout"></div>
    </div>
  </div>
</div>
<script>
const $ = s => document.querySelector(s);
let sort = "relevance", order = "desc";

let excluded = [];
async function loadFacets() {
  const f = await (await fetch("/api/facets")).json();
  for (const c of f.companies) { $("#company").append(new Option(c, c)); $("#excl-pick").append(new Option(c, c)); }
  for (const c of f.categories) $("#category").append(new Option(c, c));
}
function since(iso){ if(!iso) return ""; const m=(Date.now()-new Date(iso))/60000;
  return m<2?"just now":m<60?Math.floor(m)+"m ago":m<1440?Math.floor(m/60)+"h ago":Math.floor(m/1440)+"d ago"; }
function daysSince(iso){ return (Date.now()-new Date(iso))/86400000; }
function postedDisp(s){
  if(!s) return '<span class="muted">—</span>';
  const d=new Date(s); if(isNaN(d)) return '<span class="muted">—</span>';
  const days=(Date.now()-d)/86400000;
  const lab = days<1?"today" : days<30?Math.floor(days)+"d" : days<365?Math.floor(days/30)+"mo" : Math.floor(days/365)+"y";
  // Informational only — every listed role is still active, so a long-open req
  // (e.g. "1y") is NOT stale. No alarm colors; exact date on hover.
  return `<span class="muted" title="published ${d.toISOString().slice(0,10)} (still active)">${lab}</span>`;
}
function ageColor(d){ const t=Math.max(0,Math.min(1,d/5)); return `hsl(${Math.round(120*(1-t))},65%,55%)`; }  // 1d green → 5d red
let currentTab="new";
async function loadCounts(){ try{ const c=await (await fetch("/api/counts")).json();
  $("#cnt-new").textContent=c.new; $("#cnt-waiting").textContent=c.waiting; $("#cnt-applied").textContent=c.applied;
  $("#stale-badge").textContent = c.waiting_stale ? `⚠ ${c.waiting_stale} stale` : ""; }catch(e){} }
function renderExcluded(){
  $("#excl-chips").innerHTML = excluded.map(c=>`<span class="chip">${esc(c)} <b data-x="${esc(c)}">×</b></span>`).join("");
  document.querySelectorAll("#excl-chips b").forEach(b=>b.onclick=()=>{ excluded=excluded.filter(x=>x!==b.dataset.x); renderExcluded(); load(); });
}
function activeCount(){
  let n=excluded.length;
  for (const id of ["search","company","category","seniority","min_impact","min_relevance","posted_within"]) if($("#"+id).value) n++;
  if ($("#max_yoe").value!=="3") n++;          // non-default
  if (!$("#hide_phd").checked) n++;            // non-default (default on)
  for (const id of ["yoe_known","has_comp","closed"]) if($("#"+id).checked) n++;
  return n;
}
function fmtComp(r){
  if (r.comp_max) { const k=v=>"$"+Math.round(v/1000)+"k";
    return r.comp_min && r.comp_min!=r.comp_max ? k(r.comp_min)+"–"+k(r.comp_max) : k(r.comp_max); }
  return r.comp_raw ? `<span class="muted">${r.comp_raw}</span>` : "";
}
function ago(iso){ if(!iso) return ""; const d=(Date.now()-new Date(iso))/86400000;
  return d<1?"today":d<2?"1d":Math.floor(d)+"d"; }
function esc(s){ return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

async function load() {
  const p = new URLSearchParams();
  p.set("status", $("#closed").checked ? "closed" : "active");
  for (const id of ["search","company","category","seniority","min_impact","min_relevance","max_yoe","posted_within"]) {
    const v = $("#"+id).value; if (v) p.set(id, v);
  }
  if ($("#has_comp").checked) p.set("has_comp","true");
  if ($("#yoe_known").checked) p.set("yoe_known","true");
  if ($("#hide_phd").checked) p.set("hide_phd","true");
  if (excluded.length) p.set("exclude_companies", excluded.join(","));
  p.set("tab", currentTab);
  $("#fcount").textContent = activeCount() || "";
  p.set("sort", sort); p.set("order", order); p.set("limit","1000");
  const data = await (await fetch("/api/roles?"+p)).json();
  const tb = $("#rows"); tb.innerHTML = "";
  $("#empty").style.display = data.roles.length ? "none" : "block";
  for (const r of data.roles) {
    const tr = document.createElement("tr");
    const imp = r.impact ? `<span class="imp imp${r.impact}">${r.impact}</span>` : "";
    const tags = (r.tags||[]).slice(0,4).map(t=>`<span class="tag">${esc(t)}</span>`).join("");
    const yoe = r.yoe_min==null ? '<span class="muted">—</span>'
      : `<span class="yoe ${r.yoe_min<=4?'yoe-ok':'yoe-high'}">${r.yoe_min}</span>`;
    const fit = r.relevance==null ? '<span class="muted">—</span>'
      : `<span class="fit" title="${esc(r.relevance_reason||'')}" style="color:${r.relevance>=70?'#3fb950':r.relevance>=40?'#d29922':'#9aa3b2'}">${r.relevance}</span>`;
    const stOpts = ["new","waiting","applied"].map(s=>`<option value="${s}" ${r.status===s?"selected":""}>${s[0].toUpperCase()+s.slice(1)}</option>`).join("");
    const seen = (currentTab!=="new" && r.status_since)
      ? `<span class="age" style="color:${ageColor(daysSince(r.status_since))}" title="in ${currentTab} for ${since(r.status_since)}">⏱ ${since(r.status_since)}</span>`
      : `<span class="muted">${ago(r.first_seen)}</span>`;
    const phd = r.phd_required ? ` <span class="tag" style="color:#ff7b72;border-color:#5a2a2a" title="PhD required">PhD</span>`
              : (r.phd_mentioned ? ` <span class="tag" style="color:#e3b341;border-color:#5a4a1e" title="PhD or equivalent experience">phd?</span>` : "");
    tr.innerHTML = `
      <td class="title"><a href="${esc(r.url)}" target="_blank">${esc(r.role_title)}</a>${phd}
          ${r.overview?`<div class="ov">${esc(r.overview)}</div>`:""}</td>
      <td class="co">${esc(r.company)}</td>
      <td class="muted">${esc(r.location)}</td>
      <td class="comp">${fmtComp(r)}</td>
      <td>${yoe}</td>
      <td>${fit}</td>
      <td>${imp}</td>
      <td>${postedDisp(r.posted_at)}</td>
      <td>${tags}</td>
      <td>${seen}</td>
      <td class="actions"><a class="apply" href="${esc(r.url)}" target="_blank">Apply ↗</a>
          <a class="kit" data-key="${esc(r.key)}" title="Generate outreach + essays">✍️ Kit</a>
          <select class="statsel" data-key="${esc(r.key)}" title="Move to a pipeline stage">${stOpts}</select></td>`;
    tb.append(tr);
  }
  const s = await (await fetch("/api/stats")).json();
  $("#stats").textContent = `${data.count} shown · ${s.active} active · ${s.enriched} enriched · ${s.total} total`;
  $("#updated").textContent = s.last_updated ? `· updated ${since(s.last_updated)}` : "";
  loadCounts();
}

document.querySelectorAll("th[data-sort]").forEach(th=>th.onclick=()=>{
  const col=th.dataset.sort;
  if (sort===col) order = order==="desc"?"asc":"desc"; else { sort=col; order="desc"; }
  document.querySelectorAll("th").forEach(h=>h.classList.remove("sorted","asc"));
  th.classList.add("sorted"); if(order==="asc") th.classList.add("asc");
  load();
});
["search","company","category","seniority","min_impact","min_relevance","max_yoe","posted_within","has_comp","yoe_known","hide_phd","closed"].forEach(id=>{
  const el=$("#"+id); el.addEventListener(el.type==="checkbox"||el.tagName==="SELECT"?"change":"input", load);
});
$("#filters-btn").onclick=(e)=>{ e.stopPropagation(); $("#panel").classList.toggle("open"); };
document.addEventListener("click", e=>{ if(!e.target.closest(".fwrap")) $("#panel").classList.remove("open"); });
$("#excl-pick").onchange=()=>{ const v=$("#excl-pick").value;
  if(v && !excluded.includes(v)){ excluded.push(v); renderExcluded(); load(); } $("#excl-pick").value=""; };
$("#reset").onclick=()=>{ document.querySelectorAll("#panel input, #panel select, #search").forEach(e=>{
  if(e.type==="checkbox") e.checked=false; else e.value=""; });
  excluded=[]; renderExcluded();
  $("#max_yoe").value="3"; $("#hide_phd").checked=true;   // restore defaults: <=3 YOE, no PhD
  sort="relevance"; order="desc"; load(); };

// --- resume upload ---
async function resumeStatus(){
  try{ const me=await (await fetch("/api/me")).json();
    $("#whoami").textContent = me.username ? `👤 ${me.username}` : "";
    const up = !!me.resume;
    $("#resume-status").textContent = up ? `✓ ${me.resume.filename}` : "no resume yet";
    $("#resume-btn").textContent = up ? "📄 Replace resume" : "📄 Upload resume";
  }catch(e){}
}
$("#resume-btn").onclick=()=>$("#resume-file").click();
$("#resume-file").onchange=async(e)=>{
  const f=e.target.files[0]; if(!f) return;
  $("#resume-status").textContent="uploading…";
  const fd=new FormData(); fd.append("file",f);
  const r=await fetch("/api/resume",{method:"POST",body:fd});
  if(r.ok){ const d=await r.json(); $("#resume-status").textContent=`✓ ${d.filename} (${d.chars} chars)`; }
  else { try{$("#resume-status").textContent="✗ "+(await r.json()).detail;}catch(_){$("#resume-status").textContent="✗ upload failed";} }
};
resumeStatus();

// --- apply-kit modal (in-page) ---
let kitKey=null;
function kcard(title,text){
  const id="k"+Math.random().toString(36).slice(2);
  return `<div class="kcard"><h3>${title}<button class="copy" data-c="${id}">Copy</button></h3>
          <div class="c" id="${id}">${esc(text||"")}</div></div>`;
}
function closeKit(){ $("#overlay").classList.remove("open"); document.body.style.overflow=""; }
async function openKit(key){
  kitKey=key; $("#overlay").classList.add("open"); document.body.style.overflow="hidden";
  $("#ktitle").textContent="✍️ Apply Kit"; await genKit(false);
}
async function genKit(force){
  const st=$("#kstatus"); $("#kout").innerHTML=""; st.className=""; st.style.display="block";
  st.textContent="Generating from your resume… (first time can take ~20s)";
  try{
    const r=await fetch(`/api/role/${encodeURIComponent(kitKey)}/applykit?force=${force?1:0}`,{method:"POST"});
    if(!r.ok){ let m; try{ m=(await r.json()).detail; }catch(_){ m=`server error (HTTP ${r.status})`; } throw new Error(m||"failed"); }
    const d=await r.json(); const k=d.kit;
    if(d.role) $("#ktitle").innerHTML=`✍️ ${esc(d.role.role_title)} — <small>${esc(d.role.company)}</small>`;
    let html=kcard("LinkedIn outreach",k.linkedin_outreach)+kcard("Recruiter email",k.recruiter_email)+kcard("Referral message",k.referral_message);
    if((k.essays||[]).length){ html+=`<div class="kcard"><h3>Application essay drafts</h3>`+
      k.essays.map(e=>`<div class="essay2"><div class="q">${esc(e.q)}</div><div class="a">${esc(e.a)}</div></div>`).join("")+`</div>`; }
    st.style.display="none"; $("#kout").innerHTML=html;
    document.querySelectorAll("#kout .copy").forEach(b=>b.onclick=()=>{
      navigator.clipboard.writeText($("#"+b.dataset.c).innerText); b.textContent="Copied!"; setTimeout(()=>b.textContent="Copy",1200); });
  }catch(e){ st.className="err"; st.innerHTML=esc(e.message)+(/resume/i.test(e.message)?" — upload it with the 📄 button (top-right).":""); }
}
$("#kclose").onclick=closeKit;
$("#kregen").onclick=()=>genKit(true);
$("#overlay").onclick=(e)=>{ if(e.target.id==="overlay") closeKit(); };
document.addEventListener("keydown",e=>{ if(e.key==="Escape") closeKit(); });
$("#rows").addEventListener("click",e=>{ const a=e.target.closest(".kit"); if(a){ e.preventDefault(); openKit(a.dataset.key); } });
$("#rows").addEventListener("change", async e=>{
  const s=e.target.closest(".statsel"); if(!s) return;
  await fetch(`/api/role/${encodeURIComponent(s.dataset.key)}/status?status=${s.value}`,{method:"POST"});
  load();   // re-query: role moves to its new tab
});
document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>{
  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
  t.classList.add("active"); currentTab=t.dataset.tab;
  const seenTh=$("#th-seen");
  if (currentTab==="waiting"){ sort="status_since"; order="asc"; }     // oldest (most overdue) first
  else if (currentTab==="applied"){ sort="status_since"; order="desc"; }
  else { sort="relevance"; order="desc"; }
  // adaptive "Seen" header: sorts/labels by status age in waiting/applied
  seenTh.dataset.sort = currentTab==="new" ? "first_seen" : "status_since";
  seenTh.textContent  = currentTab==="waiting" ? "Waiting" : currentTab==="applied" ? "Applied" : "Seen";
  document.querySelectorAll("th").forEach(h=>h.classList.remove("sorted","asc"));
  const activeTh = currentTab==="new" ? document.querySelector('th[data-sort="relevance"]') : seenTh;
  activeTh.classList.add("sorted"); if(order==="asc") activeTh.classList.add("asc");
  load();
});

loadFacets().then(load);
</script>
